name: Snake Animation

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: 2128Aditya
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Deploy snake
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
